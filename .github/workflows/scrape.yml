name: Scrape events

on:
  workflow_dispatch:
    inputs:
      dates:
        description: "Dates: YYYY-MM-DD / today / today+N (space-separated; empty = today)"
        required: false
        default: ""
      cities:
        description: "City folders (space-separated)"
        required: false
        default: "New_York_US Mexico_City_MX"
      sites:
        description: "Sources subset (empty = ALL scrapers found in Scrap/)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: python -m pip install -r requirements.txt

      - name: Scrape
        shell: powershell
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          NYC_EVENTS_API_KEY: ${{ secrets.NYC_EVENTS_API_KEY }}
        run: python run_scrape.py --dates ${{ inputs.dates }} --cities ${{ inputs.cities || 'New_York_US Mexico_City_MX' }} ${{ inputs.sites && format('--sites {0}', inputs.sites) || '' }}

      - name: Commit results
        shell: powershell
        run: |
          git config user.name "scrape-bot"
          git config user.email "scrape-bot@users.noreply.github.com"
          git add result
          $changed = git status --porcelain
          if (-not $changed) { Write-Host "no new data"; exit 0 }
          git commit -m "scrape: $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
          git push
