name: Scrape events

on:
  workflow_dispatch:
    inputs:
      city:
        description: "City (free text, e.g. New York, Guadalajara)"
        required: false
        default: "New York"
      country:
        description: "Country code (e.g. US, MX, CA)"
        required: false
        default: "US"
      start_date:
        description: "Start date: YYYY-MM-DD, today, or today+N"
        required: false
        default: "today"
      end_date:
        description: "End date (blank = single day; a range does a batch pull)"
        required: false
        default: ""
      tz:
        description: "Timezone (blank = default for country; e.g. America/Los_Angeles)"
        required: false
        default: ""
      sites:
        description: "Sources subset (blank = all scrapers in Scrap/)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: python -m pip install -r requirements.txt

      - name: Scrape
        shell: powershell
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          NYC_EVENTS_API_KEY: ${{ secrets.NYC_EVENTS_API_KEY }}
        run: python run_scrape.py --city "${{ inputs.city }}" --country "${{ inputs.country }}" --start "${{ inputs.start_date }}" --end "${{ inputs.end_date }}" --tz "${{ inputs.tz }}" ${{ inputs.sites && format('--sites {0}', inputs.sites) || '' }}

      - name: Commit results
        shell: powershell
        run: |
          git config user.name "scrape-bot"
          git config user.email "scrape-bot@users.noreply.github.com"
          git add result
          $changed = git status --porcelain
          if (-not $changed) { Write-Host "no new data"; exit 0 }
          git commit -m "scrape: $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
          git push
